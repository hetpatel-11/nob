name: AI Issue Maintainer Actions

on:
  issue_comment:
    types: [created, edited]

permissions:
  contents: read
  issues: write

jobs:
  maintainer-actions:
    if: ${{ github.event.issue.pull_request == null && startsWith(github.event.comment.body, '/ai-') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build AI support runner
        run: npm run build

      - name: Handle maintainer command
        id: assistant
        run: node dist-ai-support/tools/ai_support/run_assistant.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL: ${{ vars.CLAUDE_MODEL || 'claude-3-5-sonnet-latest' }}
          AI_SUPPORT_MODE: ${{ vars.AI_SUPPORT_MODE || 'full' }}
          AI_SUPPORT_RUN_MODE: commands

      - name: Upload command artifact
        if: ${{ always() && steps.assistant.outputs.artifact_path != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: ai-issue-maintainer-actions-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ steps.assistant.outputs.artifact_path }}
          if-no-files-found: ignore
