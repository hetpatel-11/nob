name: AI Issue Assistant

on:
  issues:
    types: [opened, reopened, edited]
  issue_comment:
    types: [created, edited]

permissions:
  contents: read
  issues: write

jobs:
  run-assistant:
    if: ${{ github.event.issue.pull_request == null && github.event.sender.type != 'Bot' && (github.event_name != 'issue_comment' || !startsWith(github.event.comment.body, '/ai-')) }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build AI support runner
        run: npm run build

      - name: Create GitHub App token (optional)
        id: app-token
        if: ${{ secrets.NOB_APP_ID != '' && secrets.NOB_APP_PRIVATE_KEY != '' }}
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.NOB_APP_ID }}
          private-key: ${{ secrets.NOB_APP_PRIVATE_KEY }}

      - name: Validate required secrets
        if: ${{ secrets.ANTHROPIC_API_KEY == '' }}
        run: |
          echo "ANTHROPIC_API_KEY is not set. Add it in repo/org Actions secrets."
          exit 1

      - name: Run AI issue assistant
        id: assistant
        run: node dist-ai-support/tools/ai_support/run_assistant.js
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL: ${{ vars.CLAUDE_MODEL || 'claude-3-5-sonnet-latest' }}
          AI_SUPPORT_MODE: ${{ vars.AI_SUPPORT_MODE || 'shadow' }}
          AI_SUPPORT_AUTORUN: '1'

      - name: Upload assistant artifact
        if: ${{ always() && steps.assistant.outputs.artifact_path != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: ai-issue-assistant-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ steps.assistant.outputs.artifact_path }}
          if-no-files-found: ignore
